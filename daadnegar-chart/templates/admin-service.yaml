{{- if .Values.adminPanel.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "daadnegar-chart.fullname" . }}-admin
  labels:
    {{- include "daadnegar-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "daadnegar-chart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: admin
{{- end }}
