{{- if and .Values.tor.enabled ((.Values.tor.persistence | default dict).enabled) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "daadnegar-chart.fullname" . }}-tor-data
  labels:
    {{- include "daadnegar-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: tor
  annotations:
    # Prevent accidental deletion of the keypair that backs the .onion address
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  {{- with (.Values.tor.persistence | default dict).storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ (.Values.tor.persistence | default dict).size | default "100Mi" }}
{{- end }}
