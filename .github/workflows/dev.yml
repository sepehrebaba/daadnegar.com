name: Deploy Image dev

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  IMAGE: ${{ github.repository_owner }}/daadnegar
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  build-and-deploy:
    runs-on: arc-runner-set

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # GITHUB_ENV vars are not visible until the *next* step — do not build the tag from them here.
      - name: Compute dev image tag (commit short SHA + date)
        id: version
        run: |
          SHORT="${GITHUB_SHA:0:8}"
          DATE="$(date +'%Y-%m-%d')"
          echo "COMMIT_SHA_SHORT=$SHORT" >> "$GITHUB_ENV"
          echo "CURRENT_DATE=$DATE" >> "$GITHUB_ENV"
          echo "version=${SHORT}-${DATE}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registery
        uses: docker/login-action@v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Kaniko credentials
        run: |
          mkdir -p /kaniko/.docker
          echo "{\"auths\":{\"ghcr.io\":{\"auth\":\"$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64 -w 0)\"}}}" \
            > /kaniko/.docker/config.json

      - name: Build and Push (public website image)
        uses: int128/kaniko-action@v1
        with:
          push: true
          file: Dockerfile
          context: .
          target: release-web
          tags: ghcr.io/${{ env.IMAGE }}:v${{ steps.version.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NX_CLOUD_ACCESS_TOKEN=${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
            NODE_OPTIONS=--max-old-space-size=8192
          kaniko-args: |
            --platform linux/amd64
            --cache=true
            --cache-repo=ghcr.io/${{ env.IMAGE }}/cache
            --cache-ttl=24h

      - name: Build and Push (admin-only image)
        uses: int128/kaniko-action@v1
        with:
          push: true
          file: Dockerfile
          context: .
          target: release-admin
          tags: ghcr.io/${{ env.IMAGE }}:v${{ steps.version.outputs.version }}-admin
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NX_CLOUD_ACCESS_TOKEN=${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
            NODE_OPTIONS=--max-old-space-size=8192
          kaniko-args: |
            --platform linux/amd64
            --cache=true
            --cache-repo=ghcr.io/${{ env.IMAGE }}/cache
            --cache-ttl=24h

      # Kubernetes deployment steps
      - name: Set up kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Install SOPS
        run: |
          curl -L https://github.com/getsops/sops/releases/download/v3.10.2/sops-v3.10.2.linux.amd64 -o sops
          chmod +x sops
          sudo mv sops /usr/local/bin/
          sops --version

      - name: Install Helm Secrets plugin
        run: |
          helm plugin install https://github.com/jkroepke/helm-secrets

      - name: Helm chart dependencies
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts --force-update
          helm dependency build ./daadnegar-chart

      - name: Setup GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          gpg --list-secret-keys

      - name: Create GHCR image pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.repository_owner }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes with Helm Secrets
        run: |
          helm secrets upgrade --install daadnegar ./daadnegar-chart \
            --set image.repository=ghcr.io/${{ env.IMAGE }} \
            --set image.tag=v${{ steps.version.outputs.version }} \
            --set adminPanel.enabled=true \
            --set adminPanel.image.repository=ghcr.io/${{ env.IMAGE }} \
            --set adminPanel.image.tag=v${{ steps.version.outputs.version }}-admin \
            -f daadnegar-chart/secrets.yaml \
            --wait --timeout 5m
