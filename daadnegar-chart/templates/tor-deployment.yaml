{{- if .Values.tor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daadnegar-chart.fullname" . }}-tor
  labels:
    {{- include "daadnegar-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: tor
spec:
  replicas: 1
  # Recreate ensures only one tor pod holds the PVC at a time (ReadWriteOnce)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "daadnegar-chart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tor
  template:
    metadata:
      labels:
        {{- include "daadnegar-chart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tor
    spec:
      # tor user in osminogin/tor-simple is uid/gid 101
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # tor-data is an emptyDir so fsGroup makes it drwxrwsr-x (group-write).
        # Running as uid 101 we can always create the hidden_service directory
        # here regardless of storage-class permissions on the PVC.
        - name: tor-dir-init
          image: busybox:1.36
          securityContext:
            runAsUser: 101
            runAsGroup: 101
          command:
            - sh
            - -c
            - mkdir -p /tor-data/hidden_service && chmod 700 /tor-data/hidden_service
          volumeMounts:
            - name: tor-data
              mountPath: /tor-data
        {{- if .Values.tor.persistence.enabled }}
        # Restore previously generated keypair from the PVC into the emptyDir so
        # the .onion address survives pod restarts even without existingKeySecret.
        # Failures are silent — a fresh keypair is generated if nothing is found.
        - name: tor-pvc-restore
          image: busybox:1.36
          securityContext:
            runAsUser: 101
            runAsGroup: 101
          command:
            - sh
            - -c
            - |
              if [ -f /tor-pvc/hidden_service/hs_ed25519_secret_key ]; then
                cp /tor-pvc/hidden_service/* /tor-data/hidden_service/ 2>/dev/null || true
                chmod 600 /tor-data/hidden_service/* 2>/dev/null || true
              fi
          volumeMounts:
            - name: tor-data
              mountPath: /tor-data
            - name: tor-data-pvc
              mountPath: /tor-pvc
              readOnly: true
        {{- end }}
        {{- if .Values.tor.existingKeySecret }}
        # Copy the pinned v3 keypair from the Secret into the emptyDir.
        # Runs last so it takes precedence over any PVC-restored keys.
        - name: tor-key-init
          image: busybox:1.36
          securityContext:
            runAsUser: 101
            runAsGroup: 101
          command:
            - sh
            - -c
            - |
              cp /tor-keys/hs_ed25519_secret_key /tor-data/hidden_service/
              cp /tor-keys/hs_ed25519_public_key /tor-data/hidden_service/
              cp /tor-keys/hostname /tor-data/hidden_service/
              chmod 600 /tor-data/hidden_service/*
          volumeMounts:
            - name: tor-data
              mountPath: /tor-data
            - name: tor-keys
              mountPath: /tor-keys
              readOnly: true
        {{- end }}
      containers:
        - name: tor
          image: "{{ .Values.tor.image.repository }}:{{ .Values.tor.image.tag }}"
          imagePullPolicy: {{ .Values.tor.image.pullPolicy }}
          command: ["tor", "-f", "/etc/tor/torrc"]
          volumeMounts:
            - name: torrc
              mountPath: /etc/tor/torrc
              subPath: torrc
              readOnly: true
            - name: tor-data
              mountPath: /tor-data
          # Wait up to 5 min for tor to bootstrap and write the hostname file
          livenessProbe:
            exec:
              command: ["test", "-f", "/tor-data/hidden_service/hostname"]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 10
          {{- with .Values.tor.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if and .Values.tor.persistence.enabled (empty .Values.tor.existingKeySecret) }}
        # Periodically sync the generated keypair from the emptyDir back to the
        # PVC so it survives pod restarts (best-effort; silently skipped if the
        # storage class does not give group-write on the PVC root).
        - name: tor-key-sync
          image: busybox:1.36
          securityContext:
            runAsUser: 101
            runAsGroup: 101
          command:
            - sh
            - -c
            - |
              while true; do
                if [ -f /tor-data/hidden_service/hostname ]; then
                  mkdir -p /tor-pvc/hidden_service 2>/dev/null || true
                  cp /tor-data/hidden_service/* /tor-pvc/hidden_service/ 2>/dev/null || true
                fi
                sleep 60
              done
          volumeMounts:
            - name: tor-data
              mountPath: /tor-data
            - name: tor-data-pvc
              mountPath: /tor-pvc
        {{- end }}
      volumes:
        - name: torrc
          configMap:
            name: {{ include "daadnegar-chart.fullname" . }}-tor-config
        # Always an emptyDir so uid 101 can write here without depending on
        # storage-class fsGroup behaviour. Keys that must persist across restarts
        # are either injected via existingKeySecret or synced to/from the PVC.
        - name: tor-data
          emptyDir: {}
        {{- if .Values.tor.persistence.enabled }}
        - name: tor-data-pvc
          persistentVolumeClaim:
            claimName: {{ include "daadnegar-chart.fullname" . }}-tor-data
        {{- end }}
        {{- if .Values.tor.existingKeySecret }}
        - name: tor-keys
          secret:
            secretName: {{ .Values.tor.existingKeySecret }}
            defaultMode: 0400
        {{- end }}
{{- end }}
